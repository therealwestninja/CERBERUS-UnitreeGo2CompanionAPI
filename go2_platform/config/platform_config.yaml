# go2_platform/config/platform_config.yaml
# ══════════════════════════════════════════════════════════════════════════
# Go2 Platform — Runtime Configuration
# ══════════════════════════════════════════════════════════════════════════

platform:
  version: "2.0.0"
  mode: "simulation"            # simulation | hardware | hybrid
  log_level: "info"             # debug | info | warn | error

api:
  host: "0.0.0.0"
  port: 8080
  cors_origins: ["*"]           # Restrict in production: ["https://your-domain.com"]
  rate_limit_rps: 30

websocket:
  port: 8080                    # Same port as REST (path: /ws)
  telemetry_hz: 5               # Broadcast rate to clients
  ping_interval_s: 30

safety:
  pitch_limit_deg: 10.0
  roll_limit_deg: 10.0
  force_limit_n: 30.0
  temp_limit_c: 72.0
  battery_min_pct: 10.0
  watchdog_s: 2.0
  human_zone_m: 0.5
  max_velocity_ms: 1.5
  collision_stop_m: 0.25

simulation:
  hz: 200
  telemetry_hz: 10
  lidar_hz: 10
  seed_obstacles: true

ros2:
  enabled: false                # Enable when ROS2 is installed
  robot_ip: "192.168.12.1"
  control_hz: 500
  max_torque_nm: 35.0
  model: "edu"                  # air | pro | edu

plugins:
  directory: "plugins"
  auto_load: true
  max_plugins: 10

fleet:
  enabled: false
  max_robots: 20
  sync_precision_ms: 50

ota:
  registry_url: ""              # https://updates.go2-platform.example.com
  auto_check: false
  backup_dir: "/tmp/go2_ota_backups"

behavior:
  default_policy: "smooth"      # smooth | agile | stable | adaptive
  idle_animation: "idle_breath"
  idle_timeout_s: 30.0

world:
  registry_path: "~/.go2_registry.yaml"
  auto_save: true
  schema_version: "2.0.0"
