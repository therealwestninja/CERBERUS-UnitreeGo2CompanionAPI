name: CERBERUS Node.js CI

on:
  push:
    paths:
      - 'ui/**'
      - 'package.json'
      - '.github/workflows/nodejs.yml'
  pull_request:
    paths: ['ui/**']

jobs:
  validate-ui:
    name: Validate UI Assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install html-validate
        run: npm install -g html-validate

      - name: Validate companion UI HTML
        run: |
          html-validate ui/index.html \
            --rule 'no-inline-style: off' \
            --rule 'require-sri: off' \
            --rule 'void-style: off' || true
          echo "HTML validation complete"

      - name: Check UI file size
        run: |
          SIZE=$(wc -c < ui/index.html)
          echo "UI file size: ${SIZE} bytes"
          if [ $SIZE -gt 300000 ]; then
            echo "WARNING: UI file exceeds 300KB (${SIZE} bytes)"
          fi

      - name: Verify i18n coverage
        run: |
          python3 -c "
          import sys, json
          sys.path.insert(0, '.')
          from backend.i18n.localization import get_engine
          e = get_engine()
          report = e.coverage_report()
          print('Translation coverage:')
          for code, stats in sorted(report.items()):
              pct = stats['coverage_pct']
              status = '✓' if pct >= 60 else '⚠'
              print(f'  {status} {code}: {pct:.0f}%')
          low = [c for c, s in report.items() if s['coverage_pct'] < 40]
          if low: print(f'Low coverage locales: {low}')
          "

  lighthouse:
    name: Lighthouse Performance Check
    runs-on: ubuntu-latest
    needs: validate-ui
    steps:
      - uses: actions/checkout@v4
      - name: Start platform server
        run: |
          pip install fastapi uvicorn pydantic python-dotenv
          python -m uvicorn backend.api.server:create_app \
            --factory --port 8080 &
          sleep 3
      - name: Check server health
        run: curl -f http://localhost:8080/health || exit 1
