[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "go2-platform"
version = "2.0.0"
description = "Modular robotics platform and extensible API ecosystem for the Unitree Go2 quadruped robot"
readme = "docs/README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
authors = [{ name = "Go2 Platform Contributors" }]
keywords = ["robotics", "unitree", "go2", "ros2", "quadruped"]

dependencies = [
    "fastapi>=0.111.0",
    "uvicorn[standard]>=0.29.0",
    "pydantic>=2.7.0",
    "websockets>=12.0",
    "aiohttp>=3.9.0",
    "pyyaml>=6.0.1",
    "python-multipart>=0.0.9",
    "python-dotenv>=1.0.0",
]

[project.optional-dependencies]
vision    = ["ultralytics>=8.0.0", "mediapipe>=0.10.0", "opencv-python>=4.9.0"]
ble       = ["bleak>=0.21.0"]
dev       = ["pytest>=8.1.0", "pytest-asyncio>=0.23.0", "httpx>=0.27.0", "ruff>=0.4.0"]

[project.scripts]
go2-server = "backend.api.server:main"

[tool.setuptools.packages.find]
where = ["."]

[tool.ruff]
line-length = 100
target-version = "py311"
select = ["E", "F", "W", "I", "UP", "B", "C4", "SIM"]
ignore = ["E501", "B008"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
