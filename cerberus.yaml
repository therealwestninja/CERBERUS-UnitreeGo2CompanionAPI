# CERBERUS — config/cerberus.yaml
# ═══════════════════════════════════════════════════════════════
# All settings can be overridden via environment variables
# (see .env.example for the mapping).
# ═══════════════════════════════════════════════════════════════

robot:
  ip:          "192.168.123.1"   # Go2 default IP on direct-connect Wi-Fi
  simulation:  false              # Set true to run without hardware

api:
  host: "0.0.0.0"
  port: 8080

plugins:
  funscript:
    autoload: ""                  # optional: path to auto-load on startup

  buttplug:
    intiface_url:    "ws://127.0.0.1:12345"
    scan_timeout_s:  5

  hismith:
    device_address:  ""           # leave blank to auto-scan via BLE
    scan_timeout_s:  10
    max_speed_pct:   80           # safety cap (0–100)

  galaxy_fit2:
    device_address:  ""           # leave blank to auto-scan
    device_name:     "Galaxy Fit2"
    scan_timeout_s:  15

safety:
  battery_min_voltage:   21.0
  tilt_limit_deg:        45.0
  hr_max_bpm:            180
  hr_critical_max_bpm:   200
  hr_min_bpm:            40
  watchdog_timeout_s:    3.0

logging:
  level: "INFO"
